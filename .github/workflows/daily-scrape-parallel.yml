name: Daily Magnum Price Scrape (Parallel)

on:
  schedule:
    # Run every day at 02:00 UTC (05:00 Almaty time) — 1h before the sequential job
    - cron: "0 2 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  scrape:
    name: Scrape Kaspi food products by subcategory
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Chromium dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2t64

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Scrape products (parallel by subcategory)
        run: npx tsx scripts/scrape-parallel.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CONCURRENCY: "3"
